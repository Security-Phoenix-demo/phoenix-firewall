# Strict Bitbucket pipeline with Phoenix Firewall
# Fail-closed + 72-hour quarantine
image: node:22-alpine

pipelines:
  default:
    - step:
        name: 'Phoenix Firewall (Strict)'
        image: alpine:3.19
        script:
          - apk add --no-cache curl jq bash
          - |
            ARCH=$(uname -m); case "$ARCH" in x86_64) ARCH="amd64" ;; aarch64) ARCH="arm64" ;; esac
            curl -sfL "https://github.com/Security-Phoenix-demo/phoenix-firewall/releases/latest/download/phoenix-firewall-linux-${ARCH}" \
              -o /usr/local/bin/phoenix-firewall && chmod +x /usr/local/bin/phoenix-firewall
          - |
            eval $(phoenix-firewall \
              --api-key $PHOENIX_API_KEY \
              --ci \
              --mode enforce \
              --fail-on block \
              --strict \
              --min-package-age-hours 72 \
              --report-path phoenix-firewall-report.json)
          - |
            if [ -f phoenix-firewall-report.json ]; then
              BLOCKED=$(jq '[.[] | select(.action == "block")] | length' phoenix-firewall-report.json 2>/dev/null || echo 0)
              TOTAL=$(jq '. | length' phoenix-firewall-report.json 2>/dev/null || echo 0)
              echo "Phoenix Firewall: ${TOTAL} evaluated, ${BLOCKED} blocked"
            fi
        artifacts:
          - phoenix-firewall-report.json

    - step:
        name: 'Build & Test'
        caches:
          - node
        script:
          - npm ci
          - npm run build
          - npm test
